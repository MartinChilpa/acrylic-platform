<div class="acr-box">
    <button class="btn btn-warning-outline w-100 mb-2">
        Sign Split Sheet
    </button>
    <button [routerLink]="['/upload']" class="btn btn-blue-grey border-info-subtle w-100" routerLinkActive="btn-info">
        Upload Track
    </button>
</div>

<div class="acr-box mt-2">
    @for (item of sidenavItems; track item) {
        <a class="sidenav-item" [routerLink]="[item.routerLink]" routerLinkActive="active-route">
            <img [ngSrc]="'assets/images/icons/' + item.icon + '.svg'" alt="Icon" width="16" height="16">
            <span class="ms-2">{{item.label}}</span>
        </a>
    }
</div>
