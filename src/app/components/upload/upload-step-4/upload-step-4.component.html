<section>
    <div class="row">
        <div class="col-12">
            <div class="acr-box">
                <p class="mb-2">Preview Your Track</p>
                <div class="d-flex gap-2">
                    <img [src]="coverImage" (click)="playSnippet()" height="110" width="110"
                        class="radius-5 cursor-pointer" data-bs-toggle="modal"
                        data-bs-target="#upload-preview-snippet" />
                    <div class="d-flex flex-column">
                        <span>{{ form.get('name')?.value }}</span>
                        <span>{{ myArtist?.name }}</span>
                        <span>{{ duration }}</span>
                        @if (form.value['tags']?.length) {
                        <div class="mt-3 d-flex gap-2">
                            @for (item of form.value['tags']; track item) {
                            <span class="bg-light-gray px-2 py-1 radius-5">{{ item }}</span>
                            }
                        </div>
                        }
                        <a href="javascript: void(0);" class="a-blue mt-2">Feel like the tags don’t match to the
                            track?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="my-4">
        <div class="row gap-2">
            <div class="col-12">
                <div class="row justify-content-center gy-2">
                    <div class="col-md-5 col-12 text-end">
                        <button class="btn btn-darkgrey px-4 px-lg-5 py-2 light-gray-border"
                            (click)="nextUploadStepper(3)">Back</button>
                    </div>
                    <div class="col-md-5 col-12">
                        <button class="btn btn-info px-4 px-lg-5 py-2 light-gray-border"
                            (click)="nextUploadStepper(5)">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="upload-preview-snippet" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body bg-darkgrey radius-5 p-0">
                <div class="p-3">
                    <div class="d-flex-justify-between px-2 mb-3">
                        <h6 class="fw-semibold">Preview</h6>
                        <button class="bg-transparent border-0" data-bs-dismiss="modal"><img
                                ngSrc="/assets/images/icons/close.svg" alt="close" (click)="pauseSnippet()" width="20"
                                height="20" /></button>
                    </div>
                    @if (snippet) {
                    <div class="text-center">
                        <video [src]="snippet" controls #videoSnippet></video>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
