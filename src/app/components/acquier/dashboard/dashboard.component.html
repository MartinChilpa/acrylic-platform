<acrylic-header
  [teamName]="teamName"
  [teamLogo]="teamLogo"
  [tagline]="tagline"
  [primaryColor]="primaryColor"
  [secondaryColor]="secondaryColor">
</acrylic-header>


<div class="content-area">
  <div class="search-section">
 @if (showLocalMusic) {
<h2 class="search-title">{{ 'dashboard.searchTitleStart' | transloco }} <span class="search-title__highlight">{{ 'dashboard.searchTitleHighlight' | transloco }}</span> {{ 'dashboard.searchTitleEnd' | transloco }}</h2>
 }
<acrylic-similarity-search style="padding: 0;" (searched)="onSimilaritySearched()"> </acrylic-similarity-search>


</div>
 @if (showLocalMusic) {
  <acrylic-local-music></acrylic-local-music>
 }
</div>
