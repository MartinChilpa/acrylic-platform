<div class="upload-track">
  <div class="upload-track__header">
    <h2 class="upload-track__title">Upload CSV</h2>
    <button type="button" class="upload-track__clear" (click)="clear()" [disabled]="!fileName && !rows.length && !errorMessage">
      Clear
    </button>
  </div>

  <div class="upload-track__controls">
    <input type="file" accept=".csv,text/csv" (change)="onFileInputChange($event)" />
    <div class="upload-track__hint">Assumes first row is header.</div>
  </div>

  <div class="upload-track__meta" *ngIf="fileName">
    <div class="upload-track__file">File: {{ fileName }}</div>
    <div class="upload-track__info">
      Delimiter:
      <span class="upload-track__pill" [ngClass]="{ 'upload-track__pill--tab': delimiter === '\t' }">
        {{ delimiter === '\t' ? 'TAB' : delimiter }}
      </span>
      Rows: <span class="upload-track__pill">{{ rows.length }}</span>
      Columns: <span class="upload-track__pill">{{ columnCount }}</span>
    </div>
  </div>

  <div class="upload-track__error" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="upload-track__success" *ngIf="successMessage">{{ successMessage }}</div>

  <div class="upload-track__actions" *ngIf="fileName && !errorMessage">
    <button type="button" class="upload-track__upload" (click)="selectedFile && onFileSelected(selectedFile)" [disabled]="!selectedFile || isUploading">
      {{ isUploading ? 'Uploading…' : 'Upload CSV' }}
    </button>
  </div>

  <div class="upload-track__preview" *ngIf="rows.length">
    <div class="upload-track__preview-title">Preview (first 10 rows)</div>
    <div class="upload-track__table-wrap">
      <table class="upload-track__table">
        <thead *ngIf="header.length">
          <tr>
            <th *ngFor="let h of header">{{ h || '-' }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of previewRows">
            <td *ngFor="let cell of row; let i = index">
              {{ cell }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="upload-track__artists" *ngIf="artistsWithSpotify.length">
    <div class="upload-track__artists-title">Artists</div>
    <div class="upload-track__artists-actions">
      <button type="button" class="upload-track__upload" (click)="sendArtistsToBackend()" [disabled]="isSendingArtists">
        {{ isSendingArtists ? 'Sending…' : 'Send artists to backend' }}
      </button>
    </div>
    <ul class="upload-track__artists-list">
      <li class="upload-track__artists-item" *ngFor="let artist of artistsWithSpotify">
        <span class="upload-track__artist-name">{{ artist.name }}</span>
        <a class="upload-track__artist-spotify" *ngIf="artist.spotify_url" [href]="artist.spotify_url" target="_blank" rel="noopener noreferrer">
          Spotify
        </a>
      </li>
    </ul>
  </div>
</div>
